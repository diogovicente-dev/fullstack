<!doctype html>
<html lang="pt-BR">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snitap</title>
    <link rel="stylesheet" href="./styles/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="container flex">
      <!-- para acessibilidade, melhor colocar essa tag como <nav>, pois olhando esse header tem itens 'clicáveis' para fins de estudo manteremos esse header -->
      <a href="#" title="logo snitap">
        <img src="./assets/logo.svg" alt="logo snitap" />
      </a>

      <a href="#" title="carrinho de compras">
        <!-- colocar o atributo title para descrever o que a tag a faz, pois é apenas uma imagem -->
        <img
          src="./assets/icons/shopping-bag.svg"
          alt="ícone do carrinho de compras"
        />
        <span class="flex">1</span>
      </a>
    </header>

    <section id="hero" class="container flex gap-2">
      <div id="main" class="grid gap-3">
        <h1>
          Snitap, sua vida mais
          <div>
            <span>radical</span>
            <span>divertida</span>
            <span>saudável</span>
            <span>radical</span>
            <!-- criado esse novamente para ter o efeito 'infinito' na animação -->
          </div>
        </h1>
        <div class="buttons flex">
          <a href="#" class="button buy shadow flex gap-0.75">
            <img src="./assets/icons/shopping-bag.svg" alt="" />
            COMPRAR AGORA
          </a>

          <a href="#" class="button play flex gap-0.75">
            <span class="shadow flex">
              <!-- usado esse span para fazer o círculo do layout -->
              <img src="./assets/icons/play.svg" alt="" />
            </span>
            VEJA EM AÇÃO
          </a>
        </div>
      </div>
      <div id="hero-img">
        <div class="content">
          <img src="./assets/hero/ellipse.svg" alt="" />
          <img src="./assets/hero/patins-image.png" alt="" />
          <img src="./assets/hero/stars-1.svg" alt="" />
          <img src="./assets/hero/stars-2.svg" alt="" />
        </div>
      </div>
    </section>

    <section class="banner">
      <div class="scroller bg-gradient-animate">
        <!-- vai definir os limites -->
        <div class="rolling flex gap-1.5">
          <!-- aqui vai ser o comportamento da animação -->
          <!-- imagem banner.svg salva nos assets com o patins + estrela -->
          <!-- com javascript criaria apenas um elemento e faria a duplicação via cógido, para identificar o tamanho da tela e a quantidade de elementos necessários ; apenas com CSS precisamos duplicar os elementos -->

          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
          <img src="./assets/banner.svg" alt="" />
        </div>
      </div>
    </section>

    <section class="gallery container">
      <header>
        <span>GALERIA DE FOTOS</span>
        <h2>#usesnitap por aí</h2>
      </header>

      <div class="content grid">
        <figure>
          <img src="./assets/images/01.png" alt="" />
          <figcaption class="flex gap-0.5">
            <img src="./assets/images/picture.png" alt="" />
            <span>@laviniapereira</span>
          </figcaption>
        </figure>

        <figure data-delay>
          <img src="./assets/images/02.png" alt="" />
          <figcaption class="flex gap-0.5">
            <img src="./assets/images/picture.png" alt="" />
            <span>@laviniapereira</span>
          </figcaption>
        </figure>

        <figure>
          <img src="./assets/images/03.png" alt="" />
          <figcaption class="flex gap-0.5">
            <img src="./assets/images/picture.png" alt="" />
            <span>@laviniapereira</span>
          </figcaption>
        </figure>

        <figure data-delay>
          <img src="./assets/images/04.png" alt="" />
          <figcaption class="flex gap-0.5">
            <img src="./assets/images/picture.png" alt="" />
            <span>@laviniapereira</span>
          </figcaption>
        </figure>
      </div>
    </section>
  </body>
</html>
